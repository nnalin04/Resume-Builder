name: CI

on:
  workflow_dispatch:  # manual trigger only — re-enable push/PR when CI is stable

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get install -y libmupdf-dev

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt --timeout 300
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        working-directory: backend
        env:
          JWT_SECRET_KEY: test-secret-key
          CASHFREE_APP_ID: test
          CASHFREE_SECRET_KEY: test
          GEMINI_API_KEY: test
        run: pytest tests/ -v --tb=short

  frontend:
    name: Frontend — type-check + test + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: rm -f package-lock.json && npm install

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: frontend
        run: npm test -- --run

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t resume-backend ./backend

      - name: Build frontend image
        run: docker build -t resume-frontend ./frontend
